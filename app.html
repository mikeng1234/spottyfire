<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpottyFire Studio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" integrity="sha384-cCVCZkAjYNxaYKbM8lsArLznDF/SvMFr1jcZrvOpSTCa0W40ZAdLzHCEulnUa5i7" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha384-D/t0ZMqQW31H3az8ktEiNb39wyKnS82iFY52QPACM+IjKW3jDUhyIgh2PApRqJZs" crossorigin="anonymous"></script>
  <script src="dist/spottyfire.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* ── Landing page ── */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #08080c;
      color: #e8e8f0;
      padding: 40px;
    }
    .landing-logo {
      font-size: 48px; font-weight: 800; letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .landing-logo span { color: #7c6aef; }
    .landing-sub {
      font-size: 16px; color: #555568; margin-bottom: 40px;
      text-align: center; max-width: 500px; line-height: 1.6;
    }

    /* Drop zone */
    .drop-zone {
      width: 500px; max-width: 90vw; height: 240px;
      border: 2px dashed #2a2d3a;
      border-radius: 16px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 250ms ease;
      background: #101018;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #7c6aef;
      background: rgba(124,106,239,0.05);
      box-shadow: 0 0 40px rgba(124,106,239,0.1);
    }
    .drop-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
    .drop-text { font-size: 16px; color: #8888a0; margin-bottom: 8px; }
    .drop-hint { font-size: 12px; color: #555568; }
    .drop-hint a { color: #7c6aef; cursor: pointer; text-decoration: underline; }

    .landing-or { color: #555568; font-size: 13px; margin: 24px 0; }

    .sample-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .sample-btn {
      background: #1a1d29; border: 1px solid #2a2d3a; border-radius: 8px;
      color: #8888a0; padding: 10px 20px; font-size: 12px; cursor: pointer;
      transition: all 200ms ease; font-family: inherit;
    }
    .sample-btn:hover {
      border-color: #7c6aef; color: #e8e8f0; background: rgba(124,106,239,0.08);
    }

    .landing-footer {
      margin-top: 48px; font-size: 11px; color: #3a3a4a; text-align: center;
    }
    .landing-footer a { color: #555568; }

    /* ── App mode ── */
    .app-container { display: none; flex-direction: column; height: 100vh; }
    .app-container.active { display: flex; }
    .landing.hidden { display: none; }

    .app-body { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    .app-sidebar-left {
      width: 260px; min-width: 260px; background: var(--sl-panel-bg);
      border-right: 1px solid var(--sl-panel-border); overflow-y: auto;
      transition: width 250ms ease, min-width 250ms ease;
    }
    .app-sidebar-left.collapsed { width: 0; min-width: 0; border-right: none; overflow: hidden; }
    .app-sidebar-right {
      width: 260px; min-width: 260px; background: var(--sl-panel-bg);
      border-left: 1px solid var(--sl-panel-border); overflow-y: auto;
      transition: width 250ms ease, min-width 250ms ease;
    }
    .app-sidebar-right.collapsed { width: 0; min-width: 0; border-left: none; overflow: hidden; }
    .app-sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-bottom: 1px solid var(--sl-panel-border);
      font-size: 13px; font-weight: 700; color: var(--sl-text-primary); white-space: nowrap;
    }
    .app-sidebar-header button {
      background: none; border: 1px solid var(--sl-panel-border); border-radius: 5px;
      color: var(--sl-text-muted); cursor: pointer; padding: 2px 7px; font-size: 10px;
      font-family: inherit; transition: all 200ms ease;
    }
    .app-sidebar-header button:hover { border-color: var(--sl-accent); color: var(--sl-text-primary); }
    .app-sidebar-tab {
      position: fixed; top: 50%; z-index: 30;
      background: var(--sl-panel-bg); border: 1px solid var(--sl-panel-border);
      color: var(--sl-text-muted); cursor: pointer; padding: 10px 5px;
      font-size: 11px; writing-mode: vertical-lr; letter-spacing: 1px;
      font-family: inherit; transition: all 200ms ease; display: none;
    }
    .app-sidebar-tab:hover { color: var(--sl-text-primary); border-color: var(--sl-accent); }
    .app-tab-left { left: 0; border-left: none; border-radius: 0 6px 6px 0; transform: translateY(-50%) rotate(180deg); }
    .app-tab-right { right: 0; border-right: none; border-radius: 6px 0 0 6px; transform: translateY(-50%); }
    .app-tab-left.visible, .app-tab-right.visible { display: block; }
    .app-main {
      flex: 1; overflow: hidden; padding: 8px; min-width: 0;
      display: flex; flex-direction: column;
      height: calc(100vh - 36px); /* viewport minus menubar */
    }
    .app-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      flex: 1;
      min-height: 0;
    }
    .app-grid > * { min-height: 0; min-width: 0; overflow: hidden; }

    /* Loading spinner */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px; color: #8888a0;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #2a2d3a;
      border-top-color: #7c6aef; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media print { .landing { display: none !important; } }
  </style>
</head>
<body>

  <!-- Landing Page -->
  <div class="landing" id="landing">
    <div class="landing-logo"><span>Spotty</span>Fire Studio</div>
    <div class="landing-sub">
      Drop-in data analytics. Upload a CSV and get an interactive dashboard instantly —
      with cross-chart filtering, formulas, and 8 beautiful themes.
    </div>

    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📊</div>
      <div class="drop-text">Drop a CSV file here</div>
      <div class="drop-hint">or <a id="browseLink">browse your files</a></div>
    </div>
    <input type="file" id="fileInput" accept=".csv,.json,.tsv" style="display:none;">

    <div class="landing-or">or try a sample dataset</div>
    <div class="sample-btns">
      <button class="sample-btn" onclick="loadSample('data/sample-employees.csv')">Employees (200 rows)</button>
      <button class="sample-btn" onclick="loadSample('data/sample-sales.csv')">Sales (100 rows)</button>
    </div>

    <div class="landing-footer">
      <a href="https://github.com/mikeng1234/spottyfire" target="_blank">GitHub</a> &middot; MIT License &middot; v1.0
    </div>
  </div>

  <!-- Toggle tabs (shown when sidebars collapsed) -->
  <button class="app-sidebar-tab app-tab-left visible" id="tabLeft" onclick="toggleAppSidebar('left')">COLUMNS</button>
  <button class="app-sidebar-tab app-tab-right visible" id="tabRight" onclick="toggleAppSidebar('right')">FILTERS</button>

  <!-- App Container (shown after data load) -->
  <div class="app-container" id="app">
    <div id="menubar"></div>
    <div class="app-body">
      <div class="app-sidebar-left collapsed" id="sidebarLeft">
        <div class="app-sidebar-header">
          <span>Tools</span>
          <button onclick="toggleAppSidebar('left')">&laquo;</button>
        </div>
        <div id="vizPanel"></div>
        <div style="border-top:1px solid var(--sl-panel-border);"></div>
        <div id="colPanel"></div>
      </div>
      <div class="app-main" id="main"></div>
      <div class="app-sidebar-right collapsed" id="sidebarRight">
        <div class="app-sidebar-header">
          <span>Filters</span>
          <button onclick="toggleAppSidebar('right')">&raquo;</button>
        </div>
        <div id="filterPanel"></div>
      </div>
    </div>
  </div>

  <script>
    function toggleAppSidebar(side) {
      var sb = document.getElementById(side === 'left' ? 'sidebarLeft' : 'sidebarRight');
      var tab = document.getElementById(side === 'left' ? 'tabLeft' : 'tabRight');
      var c = sb.classList.toggle('collapsed');
      sb.style.display = 'none'; void sb.offsetWidth; sb.style.display = '';
      tab.classList.toggle('visible', c);
      setTimeout(function () { window.dispatchEvent(new Event('resize')); }, 300);
    }

    // Recalculate grid layout: 2 per row, odd last gets full width, equal row heights
    function recalcLayout() {
      var grid = document.querySelector('.app-grid');
      if (!grid) return;

      // Remove any existing empty state
      var emptyMsg = grid.querySelector('.app-empty-state');
      if (emptyMsg) emptyMsg.remove();

      var children = Array.from(grid.children);
      var count = children.length;

      if (count === 0) {
        // Show empty state
        grid.style.gridTemplateRows = '1fr';
        var empty = document.createElement('div');
        empty.className = 'app-empty-state';
        empty.style.cssText = 'grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sl-text-muted);text-align:center;padding:40px;';
        empty.innerHTML = '<div style="font-size:48px;margin-bottom:16px;opacity:0.3;">\uD83D\uDCCA</div>' +
          '<div style="font-size:16px;font-weight:600;color:var(--sl-text-secondary);margin-bottom:8px;">No visualizations</div>' +
          '<div style="font-size:13px;">Open the <strong>Tools</strong> panel on the left and click a visualization type to get started.</div>';
        grid.appendChild(empty);
        return;
      }

      // Calculate number of rows
      var rows = Math.ceil(count / 2);

      // Set equal row heights
      grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)';

      // Assign grid positions
      children.forEach(function (c, i) {
        var row = Math.floor(i / 2) + 1;
        var col = (i % 2) + 1;
        var isLastOdd = (i === count - 1) && (count % 2 === 1);

        c.style.gridRow = row;
        c.style.gridColumn = isLastOdd ? '1 / -1' : col;
      });

      // Trigger Plotly resize
      [100, 300, 600].forEach(function (d) {
        setTimeout(function () { window.dispatchEvent(new Event('resize')); }, d);
      });
    }

    // Make it globally accessible for VizPanel and destroy
    window.recalcLayout = recalcLayout;

    SpottyFire.setTheme('obsidian');

    // ── Drag & Drop ──
    var dropZone = document.getElementById('dropZone');
    var fileInput = document.getElementById('fileInput');

    document.getElementById('browseLink').addEventListener('click', function () { fileInput.click(); });
    dropZone.addEventListener('click', function () { fileInput.click(); });

    dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', function (e) {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      var file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    fileInput.addEventListener('change', function () {
      if (fileInput.files[0]) loadFile(fileInput.files[0]);
    });

    function loadFile(file) {
      var reader = new FileReader();
      reader.onload = function (e) {
        var text = e.target.result;
        if (file.name.endsWith('.json')) {
          try {
            var arr = JSON.parse(text);
            if (Array.isArray(arr)) buildDashboard(arr, file.name);
          } catch (err) { alert('Invalid JSON file'); }
        } else {
          buildDashboard(text, file.name);
        }
      };
      reader.readAsText(file);
    }

    function loadSample(url) {
      buildDashboard(url, url.split('/').pop());
    }

    function buildDashboard(dataOrUrl, filename) {
      // Show app, hide landing
      document.getElementById('landing').classList.add('hidden');
      var appEl = document.getElementById('app');
      appEl.classList.add('active');

      // Show loading
      var main = document.getElementById('main');
      main.innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing data...</div>';

      var ds = new SpottyFire.DataStore();

      function _render() {
        // Menu bar
        SpottyFire.MenuBar('#menubar', ds, {
          themes: ['obsidian', 'porcelain', 'midnight', 'arctic', 'neon', 'corporate']
        });

        // Viz panel (left, top)
        SpottyFire.VizPanel('#vizPanel', ds, { target: '.app-grid' });

        // Column panel (left, below viz)
        SpottyFire.ColumnPanel('#colPanel', ds);

        // Filter panel (right)
        SpottyFire.FilterPanel('#filterPanel', ds);

        // Auto-generate charts — pick best columns
        var cols = ds.getColumns().filter(function (c) { return c.name !== '__rowIndex'; });
        var numCols = cols.filter(function (c) { return c.type === 'number'; });
        // For categories: pick string columns with < 20 unique values (skip IDs, names)
        var strCols = cols.filter(function (c) { return c.type === 'string'; });
        var catCols = strCols.filter(function (c) {
          return ds.getColumnValues(c.name).length <= 20;
        });
        // If no good categorical columns, fall back to all string columns
        if (catCols.length === 0) catCols = strCols;

        main.innerHTML = '';

        // Title (outside grid so it doesn't take 1fr row)
        var header = document.createElement('div');
        header.style.cssText = 'padding:4px 4px 8px;flex-shrink:0;';
        header.innerHTML = '<h2 style="font-size:16px;font-weight:700;color:var(--sl-text-primary);margin:0 0 2px;">' +
          filename + '</h2><p style="font-size:11px;color:var(--sl-text-muted);margin:0;">' +
          ds.getRowCount() + ' rows &middot; ' + cols.length + ' columns &middot; Click charts to cross-filter</p>';
        main.appendChild(header);

        var grid = document.createElement('div');
        grid.className = 'app-grid';

        function _addChart(createFn) {
          var d = document.createElement('div');
          grid.appendChild(d);
          createFn(d);
        }

        // Bar chart
        if (catCols.length > 0 && numCols.length > 0) {
          _addChart(function (d) {
            SpottyFire.BarChart(d, ds, {
              category: catCols[0].name, value: numCols[0].name,
              aggregation: 'avg', showValues: true,
              title: 'Avg ' + numCols[0].name + ' by ' + catCols[0].name
            });
          });
        }

        // Scatter
        if (numCols.length >= 2) {
          _addChart(function (d) {
            SpottyFire.ScatterPlot(d, ds, {
              x: numCols[1].name, y: numCols[0].name,
              colorBy: catCols.length > 0 ? catCols[0].name : null,
              pointSize: 7,
              title: numCols[1].name + ' vs ' + numCols[0].name
            });
          });
        }

        // Pie
        if (catCols.length > 0 && numCols.length > 0) {
          _addChart(function (d) {
            var pieCat = catCols.length > 1 ? catCols[1].name : catCols[0].name;
            SpottyFire.PieChart(d, ds, {
              category: pieCat, value: numCols[0].name,
              aggregation: 'sum', hole: 0.45, showPercent: true,
              title: numCols[0].name + ' by ' + pieCat
            });
          });
        }

        // Table
        _addChart(function (d) {
          SpottyFire.DataTable(d, ds, {
            columns: cols.map(function (c) { return c.name; }).slice(0, 12),
            pageSize: 20, title: 'Data Table'
          });
        });

        main.appendChild(grid);
        recalcLayout();
      }

      if (Array.isArray(dataOrUrl)) {
        ds.loadJSON(dataOrUrl);
        _render();
      } else if (dataOrUrl.indexOf('\n') >= 0 || dataOrUrl.indexOf(',') >= 0) {
        // CSV string
        ds.loadCSV(dataOrUrl).then(_render);
      } else {
        // URL
        ds.loadCSV(dataOrUrl).then(_render);
      }
    }
  </script>
</body>
</html>
