<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpottyFire — Debug Test</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" integrity="sha384-cCVCZkAjYNxaYKbM8lsArLznDF/SvMFr1jcZrvOpSTCa0W40ZAdLzHCEulnUa5i7" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha384-D/t0ZMqQW31H3az8ktEiNb39wyKnS82iFY52QPACM+IjKW3jDUhyIgh2PApRqJZs" crossorigin="anonymous"></script>
  <script src="../dist/spottyfire.js"></script>
  <style>
    * { box-sizing: border-box; }

    /* ── Global layout: sidebar + main ── */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Collapsible filter sidebar ── */
    .filter-sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--sl-panel-bg);
      border-right: 1px solid var(--sl-panel-border);
      display: flex;
      flex-direction: column;
      transition: width 250ms ease, min-width 250ms ease;
      overflow: hidden;
      position: relative;
      z-index: 20;
    }
    .filter-sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-right: none;
    }
    .filter-sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--sl-panel-border);
      flex-shrink: 0;
    }
    .filter-sidebar-header span {
      font-size: 14px;
      font-weight: 700;
      color: var(--sl-text-primary);
      white-space: nowrap;
    }
    .filter-sidebar-header button {
      background: none;
      border: 1px solid var(--sl-panel-border);
      border-radius: 6px;
      color: var(--sl-text-muted);
      cursor: pointer;
      padding: 3px 8px;
      font-size: 11px;
      transition: all 200ms ease;
      font-family: var(--sl-font);
    }
    .filter-sidebar-header button:hover {
      color: var(--sl-text-primary);
      border-color: var(--sl-accent);
    }
    .filter-sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }
    .collapsed .filter-sidebar-content,
    .collapsed .filter-sidebar-header { display: none; }

    /* Toggle button (visible when collapsed) */
    .filter-toggle {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 30;
      background: var(--sl-panel-bg);
      border: 1px solid var(--sl-panel-border);
      border-left: none;
      border-radius: 0 8px 8px 0;
      color: var(--sl-text-muted);
      cursor: pointer;
      padding: 12px 6px;
      font-size: 12px;
      writing-mode: vertical-lr;
      transform: translateY(-50%) rotate(180deg);
      transition: all 200ms ease;
      font-family: var(--sl-font);
      letter-spacing: 1px;
    }
    .filter-toggle:hover {
      color: var(--sl-text-primary);
      border-color: var(--sl-accent);
      background: var(--sl-accent);
    }
    .filter-toggle.hidden { display: none; }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      min-width: 0;
      padding: 24px;
      overflow-y: auto;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 1300px;
    }
    .full { grid-column: 1 / -1; }
    .chart { min-height: 380px; }
    .table { height: 320px; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
    p.sub { color: var(--sl-text-secondary); font-size: 13px; margin: 0 0 8px; }
    #status {
      font-size: 12px; padding: 8px 14px; border-radius: 8px;
      background: var(--sl-panel-bg); border: 1px solid var(--sl-panel-border);
      color: var(--sl-text-secondary); margin-top: 8px;
    }
  </style>
</head>
<body>
  <!-- Toggle button (shown when sidebar collapsed) -->
  <button class="filter-toggle hidden" id="filterToggle" onclick="toggleFilters()">FILTERS</button>

  <div class="app-layout">
    <!-- Collapsible filter sidebar -->
    <aside class="filter-sidebar" id="filterSidebar">
      <div class="filter-sidebar-header">
        <span>Filters</span>
        <button onclick="toggleFilters()" title="Collapse filters">&laquo; Hide</button>
      </div>
      <div class="filter-sidebar-content">
        <div id="filters"></div>
      </div>
    </aside>

    <!-- Main content -->
    <div class="main-content">
      <div class="grid">
        <!-- Header -->
        <div class="full">
          <h1>SpottyFire Debug Test</h1>
          <p class="sub">
            Test all chart types + cross-chart marking + filters + formulas.
            Click bars/points/slices to mark. Shift+click to add. Escape to clear.
          </p>
        </div>

        <!-- Toolbar + Formula -->
        <div id="toolbar" class="full"></div>
        <div id="formula" class="full"></div>

        <!-- Charts -->
        <div id="bar" class="chart"></div>
        <div id="scatter" class="chart"></div>
        <div id="pie" class="chart"></div>
        <div id="line" class="chart"></div>
        <div id="heatmap" class="chart full"></div>
        <div id="table" class="table full"></div>

        <!-- Status log -->
        <div id="status" class="full">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    // ── Sidebar toggle ──
    function toggleFilters() {
      var sidebar = document.getElementById('filterSidebar');
      var toggle = document.getElementById('filterToggle');
      var collapsed = sidebar.classList.toggle('collapsed');
      toggle.classList.toggle('hidden', !collapsed);
      // Resize Plotly charts after transition
      setTimeout(function() { window.dispatchEvent(new Event('resize')); }, 300);
    }

    var log = function(msg) {
      var el = document.getElementById('status');
      el.textContent = msg;
      console.log('[DEBUG] ' + msg);
    };

    log('Initializing DataStore...');
    var ds = new SpottyFire.DataStore();

    ds.loadCSV('../data/sample-employees.csv').then(function() {
      log('CSV loaded: ' + ds.getRowCount() + ' rows, columns: ' + ds.getColumnNames().join(', '));

      // Add computed columns
      ds.addCalculatedColumn('AnnualSalary', '[Salary] * 12');
      ds.addCalculatedColumn('TotalComp', '[Salary] + [Bonus]');
      ds.addCalculatedColumn('Bracket', 'If([Salary] > 55000, "High", If([Salary] > 35000, "Mid", "Low"))');
      log('Computed columns added: AnnualSalary, TotalComp, Bracket');

      // Toolbar
      SpottyFire.Toolbar('#toolbar', ds, {
        showExport: true,
        showThemeToggle: true,
      });

      // Global filter panel (in sidebar)
      SpottyFire.FilterPanel('#filters', ds, {
        columns: ['Department', 'Region', 'Gender', 'IsActive', 'Salary', 'Age', 'PerformanceScore', 'Bracket']
      });

      // Formula bar
      SpottyFire.FormulaBar('#formula', ds);

      // Bar Chart
      SpottyFire.BarChart('#bar', ds, {
        category: 'Department',
        value: 'Salary',
        aggregation: 'avg',
        showValues: true,
        title: 'Avg Salary by Department'
      });

      // Scatter Plot
      SpottyFire.ScatterPlot('#scatter', ds, {
        x: 'Age',
        y: 'Salary',
        colorBy: 'Department',
        pointSize: 7,
        showOnlyMarked: true,
        title: 'Age vs Salary (marked only)'
      });

      // Pie Chart
      SpottyFire.PieChart('#pie', ds, {
        category: 'Region',
        value: 'Salary',
        aggregation: 'count',
        title: 'Headcount by Region',
        showPercent: true,
        hole: 0.45,
      });

      // Line Chart
      SpottyFire.LineChart('#line', ds, {
        x: 'HireDate',
        y: ['Salary'],
        groupBy: 'Department',
        title: 'Salary by Hire Date',
        smooth: true,
      });

      // HeatMap
      SpottyFire.HeatMap('#heatmap', ds, {
        x: 'Department',
        y: 'Region',
        value: 'PerformanceScore',
        aggregation: 'avg',
        showValues: true,
        title: 'Avg Performance: Dept x Region'
      });

      // DataTable
      SpottyFire.DataTable('#table', ds, {
        columns: ['Name', 'Department', 'Region', 'Salary', 'Bonus', 'TotalComp', 'Bracket', 'Age', 'PerformanceScore'],
        showOnlyMarked: false,
        pageSize: 25,
        title: 'All Employees (click rows to mark)'
      });

      // Listen to marking for debug
      ds._markingManager.on('marking-changed', function(e) {
        log('Marking: ' + e.markedIndices.size + ' rows selected (action: ' + e.action + ', source: ' + (e.source || 'n/a') + ')');
      });

      log('All 6 charts rendered. Ready to test!');
    }).catch(function(err) {
      log('ERROR: ' + err.message);
      console.error(err);
    });
  </script>
</body>
</html>
