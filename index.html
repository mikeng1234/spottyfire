<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpottyFire</title>
  <link rel="stylesheet" href="css/spottyfire.css">
</head>
<body>

<div id="spottyfire-root"></div>

<!-- Libraries -->
<script src="lib/papaparse.min.js"></script>
<script src="lib/echarts.min.js"></script>

<!-- Core modules (order matters) -->
<script src="core/eventbus.js"></script>
<script src="core/config.js"></script>
<script src="core/datastore.js"></script>
<script src="core/filter.js"></script>
<script src="core/marking.js"></script>
<script src="core/aggregation.js"></script>
<script src="core/layout.js"></script>

<!-- Bootstrap -->
<script>
(async function bootstrap() {
  console.log('[SpottyFire] Bootstrapping...');

  // Wire marking system to filter engine
  MarkingSystem.setFilterEngine(FilterEngine);

  // Define analysis config — 4-chart cascade demo
  const analysis = SFConfig.createDefaultAnalysis();

  // Create 3 markings for the cascade chain
  analysis.markings = [
    SFConfig.createDefaultMarking('marking-1', 'University Selection', '#5b8af5'),
    SFConfig.createDefaultMarking('marking-2', 'Category Selection', '#f5c85b'),
    SFConfig.createDefaultMarking('marking-3', 'Detail Selection', '#5bf59b'),
  ];

  // Register markings in the system
  analysis.markings.forEach(m => MarkingSystem.createMarking(m.id, m.name, m.color));

  // Define 4 panels with cascade wiring:
  // Chart 1 (University bar) → writes marking-1
  // Chart 2 (Hobby bar) → limited by marking-1, writes marking-2
  // Chart 3 (Career pie) → limited by marking-2, writes marking-3
  // Chart 4 (Age vs Social Media scatter) → limited by marking-3
  analysis.pages[0].panels = [
    SFConfig.createDefaultPanel({
      id: 'p1',
      chartType: 'bar',
      title: 'Students by University',
      xColumn: 'university',
      yColumn: null,
      aggregation: 'count',
      writesMarkingId: 'marking-1',
      limitByMarkingIds: [],
      position: { x: 0, y: 0, w: 6, h: 3 },
    }),
    SFConfig.createDefaultPanel({
      id: 'p2',
      chartType: 'bar',
      title: 'Students by Hobby',
      xColumn: 'hobby',
      yColumn: null,
      aggregation: 'count',
      writesMarkingId: 'marking-2',
      limitByMarkingIds: ['marking-1'],
      position: { x: 6, y: 0, w: 6, h: 3 },
    }),
    SFConfig.createDefaultPanel({
      id: 'p3',
      chartType: 'pie',
      title: 'Career Aspirations',
      xColumn: 'career_aspiration',
      yColumn: null,
      aggregation: 'count',
      writesMarkingId: 'marking-3',
      limitByMarkingIds: ['marking-2'],
      position: { x: 0, y: 3, w: 6, h: 3 },
    }),
    SFConfig.createDefaultPanel({
      id: 'p4',
      chartType: 'scatter',
      title: 'Age vs Social Media (Detail)',
      xColumn: 'age',
      yColumn: 'social_media_hours_per_day',
      colorColumn: 'gender',
      aggregation: null,
      writesMarkingId: null,
      limitByMarkingIds: ['marking-3'],
      position: { x: 6, y: 3, w: 6, h: 3 },
    }),
  ];

  // Validate marking DAG
  const validation = SFConfig.validateMarkings(analysis.pages[0].panels);
  if (!validation.valid) {
    console.error('[SpottyFire]', validation.error);
    return;
  }

  // Init layout
  LayoutEngine.init('#spottyfire-root', analysis);

  // Load CSV data
  try {
    const response = await fetch('students_data.csv');
    const csvText = await response.text();
    DataStore.loadCSV(csvText, 'default');
  } catch (e) {
    console.error('[SpottyFire] Failed to load CSV:', e);
    LayoutEngine.setStatusText('Error: Could not load data');
    return;
  }

  // Init filter scheme
  FilterEngine.initScheme('scheme-1');

  // Update status
  const rowCount = DataStore.getRowCount();
  const colCount = DataStore.getColumnNames().length;
  LayoutEngine.setStatusText('Ready');
  LayoutEngine.setStatusData(`${rowCount} rows | ${colCount} columns`);

  console.log('[SpottyFire] Foundation ready. Modules loaded:');
  console.log('  EventBus:', typeof EventBus);
  console.log('  SFConfig:', typeof SFConfig);
  console.log('  DataStore:', typeof DataStore, `(${rowCount} rows)`);
  console.log('  MarkingSystem:', typeof MarkingSystem);
  console.log('  FilterEngine:', typeof FilterEngine);
  console.log('  AggregationEngine:', typeof AggregationEngine);
  console.log('  LayoutEngine:', typeof LayoutEngine);

  // Quick self-test: aggregation
  const testAgg = AggregationEngine.aggregate({
    rowIndices: null,
    groupByColumn: 'university',
    valueColumn: null,
    aggregation: 'count',
  });
  console.log('[SpottyFire] Aggregation test (university count):', testAgg);

  // Quick self-test: marking cascade
  MarkingSystem.mark('marking-1', new Set([0, 1, 2, 3, 4]), 'replace');
  const p2Config = analysis.pages[0].panels[1];
  const visibleRows = MarkingSystem.getVisibleRows(p2Config);
  console.log('[SpottyFire] Cascade test: marked 5 rows in marking-1, Chart 2 sees', visibleRows.size, 'rows');
  MarkingSystem.clearMarking('marking-1');

  console.log('[SpottyFire] All foundation modules verified. Charts can now be wired up.');
})();
</script>

</body>
</html>
